<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>العملاء | نظام إدارة المحاماة</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="../../shared/css/style.css">
</head>
<body>

<div class="d-flex">

    <!-- Sidebar -->
    <nav class="sidebar p-2" style="width: 250px; position: sticky; top: 0;">
        <div class="sidebar-brand">⚖️ نظام المحاماة</div>
        <ul class="nav flex-column" id="sidebarNav"></ul>
    </nav>

    <!-- Main content -->
    <div class="flex-grow-1">

        <!-- Topbar -->
        <div class="topbar d-flex justify-content-between align-items-center px-4 py-3">
            <div>
                <span class="text-muted">مرحباً، </span>
                <strong id="welcomeUserName">--</strong>
                <span class="badge bg-secondary ms-2" id="welcomeUserRole">--</span>
            </div>
            <button class="btn btn-outline-danger btn-sm" id="logoutBtn">
                <i class="bi bi-box-arrow-left"></i> تسجيل الخروج
            </button>
        </div>

        <!-- Page content -->
        <div class="container-fluid p-4">

            <div class="d-flex justify-content-between align-items-center mb-4">
                <h5 class="mb-0"><i class="bi bi-people"></i> العملاء</h5>
                <button class="btn btn-primary" id="addClientBtn">
                    <i class="bi bi-plus-lg"></i> إضافة عميل جديد
                </button>
            </div>

            <div class="card shadow-sm">
                <div class="card-body">

                    <div class="mb-3">
                        <input type="text" id="searchInput" class="form-control" placeholder="🔍 بحث بالاسم أو رقم الهاتف...">
                    </div>

                    <div class="table-responsive">
                        <table class="table table-hover align-middle">
                            <thead class="table-light">
                                <tr>
                                    <th>الاسم</th>
                                    <th>رقم الهاتف</th>
                                    <th>العنوان</th>
                                    <th>الرقم القومي</th>
                                    <th>عدد القضايا</th>
                                    <th class="text-center">إجراءات</th>
                                </tr>
                            </thead>
                            <tbody id="clientsTableBody">
                                <tr><td colspan="6" class="text-center text-muted py-4">جاري التحميل...</td></tr>
                            </tbody>
                        </table>
                    </div>

                </div>
            </div>

        </div>
    </div>
</div>

<!-- Modal: إضافة / تعديل عميل -->
<div class="modal fade" id="clientModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="clientModalTitle">إضافة عميل جديد</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="clientId">

                <div class="mb-3">
                    <label class="form-label">الاسم الكامل *</label>
                    <input type="text" id="clientName" class="form-control" placeholder="مثال: أحمد علي">
                </div>

                <div class="mb-3">
                    <label class="form-label">رقم الهاتف *</label>
                    <input type="text" id="clientPhone" class="form-control" placeholder="01000000000">
                </div>

                <div class="mb-3">
                    <label class="form-label">العنوان</label>
                    <input type="text" id="clientAddress" class="form-control" placeholder="المدينة - المنطقة">
                </div>

                <div class="mb-3">
                    <label class="form-label">الرقم القومي</label>
                    <input type="text" id="clientNationalId" class="form-control" placeholder="14 رقم">
                </div>

                <div id="clientFormError" class="alert alert-danger d-none"></div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">إلغاء</button>
                <button type="button" class="btn btn-primary" id="saveClientBtn">حفظ</button>
            </div>
        </div>
    </div>
</div>

<!-- Modal: عرض قضايا العميل -->
<div class="modal fade" id="clientCasesModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">قضايا العميل: <span id="clientCasesName"></span></h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <ul class="list-group" id="clientCasesList">
                    <li class="list-group-item text-muted">جاري التحميل...</li>
                </ul>
            </div>
        </div>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script src="../../shared/js/config.js"></script>
<script src="../../shared/js/auth.js"></script>
<script src="../../shared/js/permissions.js"></script>
<script src="../../shared/js/mock-data.js"></script>
<script src="../../shared/js/api.js"></script>

<script src="../../shared/js/sidebar.js"></script>
<script src="./clients.js"></script>

</body>
</html>
