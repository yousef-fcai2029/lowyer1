<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الجلسات | نظام إدارة المحاماة</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="../../shared/css/style.css">
</head>
<body>

<div class="d-flex">

    <!-- Sidebar -->
    <nav class="sidebar p-2" style="width: 250px; position: sticky; top: 0;">
        <div class="sidebar-brand">⚖️ نظام المحاماة</div>
        <ul class="nav flex-column" id="sidebarNav"></ul>
    </nav>

    <!-- Main content -->
    <div class="flex-grow-1">

        <!-- Topbar -->
        <div class="topbar d-flex justify-content-between align-items-center px-4 py-3">
            <div>
                <span class="text-muted">مرحباً، </span>
                <strong id="welcomeUserName">--</strong>
                <span class="badge bg-secondary ms-2" id="welcomeUserRole">--</span>
            </div>
            <button class="btn btn-outline-danger btn-sm" id="logoutBtn">
                <i class="bi bi-box-arrow-left"></i> تسجيل الخروج
            </button>
        </div>

        <!-- Page content -->
        <div class="container-fluid p-4">

            <div class="d-flex justify-content-between align-items-center mb-4">
                <h5 class="mb-0"><i class="bi bi-calendar-event"></i> الجلسات</h5>
                <button class="btn btn-primary" id="addHearingBtn">
                    <i class="bi bi-plus-lg"></i> إضافة جلسة جديدة
                </button>
            </div>

            <div class="row g-2 mb-3">
                <div class="col-md-4">
                    <select id="filterType" class="form-select">
                        <option value="upcoming">الجلسات القادمة</option>
                        <option value="past">الجلسات السابقة</option>
                        <option value="all">كل الجلسات</option>
                    </select>
                </div>
            </div>

            <div class="card shadow-sm">
                <div class="card-body">
                    <div class="table-responsive">
                        <table class="table table-hover align-middle">
                            <thead class="table-light">
                                <tr>
                                    <th>التاريخ</th>
                                    <th>رقم القضية</th>
                                    <th>عنوان القضية</th>
                                    <th>المحكمة</th>
                                    <th>ملاحظات</th>
                                    <th>النتيجة</th>
                                    <th class="text-center">إجراءات</th>
                                </tr>
                            </thead>
                            <tbody id="hearingsTableBody">
                                <tr><td colspan="7" class="text-center text-muted py-4">جاري التحميل...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

        </div>
    </div>
</div>

<!-- Modal: إضافة / تعديل جلسة -->
<div class="modal fade" id="hearingModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="hearingModalTitle">إضافة جلسة جديدة</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="hearingId">

                <div class="mb-3">
                    <label class="form-label">القضية *</label>
                    <select id="hearingCase" class="form-select">
                        <option value="">-- اختر القضية --</option>
                    </select>
                </div>

                <div class="mb-3">
                    <label class="form-label">تاريخ الجلسة *</label>
                    <input type="date" id="hearingDate" class="form-control">
                </div>

                <div class="mb-3">
                    <label class="form-label">المحكمة</label>
                    <input type="text" id="hearingCourt" class="form-control" placeholder="مثال: محكمة القاهرة الاقتصادية">
                </div>

                <div class="mb-3">
                    <label class="form-label">ملاحظات</label>
                    <input type="text" id="hearingNotes" class="form-control" placeholder="اختياري">
                </div>

                <div class="mb-3">
                    <label class="form-label">نتيجة الجلسة</label>
                    <input type="text" id="hearingResult" class="form-control" placeholder="اختياري - يضاف بعد الجلسة">
                </div>

                <div id="hearingFormError" class="alert alert-danger d-none"></div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">إلغاء</button>
                <button type="button" class="btn btn-primary" id="saveHearingBtn">حفظ</button>
            </div>
        </div>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script src="../../shared/js/config.js"></script>
<script src="../../shared/js/auth.js"></script>
<script src="../../shared/js/permissions.js"></script>
<script src="../../shared/js/mock-data.js"></script>
<script src="../../shared/js/api.js"></script>

<script src="../../shared/js/sidebar.js"></script>
<script src="./hearings.js"></script>

</body>
</html>
