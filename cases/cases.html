<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>القضايا | نظام إدارة المحاماة</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="../../shared/css/style.css">
</head>
<body>

<div class="d-flex">

    <!-- Sidebar -->
    <nav class="sidebar p-2" style="width: 250px; position: sticky; top: 0;">
        <div class="sidebar-brand">⚖️ نظام المحاماة</div>
        <ul class="nav flex-column" id="sidebarNav"></ul>
    </nav>

    <!-- Main content -->
    <div class="flex-grow-1">

        <!-- Topbar -->
        <div class="topbar d-flex justify-content-between align-items-center px-4 py-3">
            <div>
                <span class="text-muted">مرحباً، </span>
                <strong id="welcomeUserName">--</strong>
                <span class="badge bg-secondary ms-2" id="welcomeUserRole">--</span>
            </div>
            <button class="btn btn-outline-danger btn-sm" id="logoutBtn">
                <i class="bi bi-box-arrow-left"></i> تسجيل الخروج
            </button>
        </div>

        <!-- Page content -->
        <div class="container-fluid p-4">

            <div class="d-flex justify-content-between align-items-center mb-4">
                <h5 class="mb-0"><i class="bi bi-briefcase"></i> القضايا</h5>
                <button class="btn btn-primary" id="addCaseBtn">
                    <i class="bi bi-plus-lg"></i> إضافة قضية جديدة
                </button>
            </div>

            <div class="card shadow-sm">
                <div class="card-body">

                    <div class="row g-2 mb-3">
                        <div class="col-md-6">
                            <input type="text" id="searchInput" class="form-control" placeholder="🔍 بحث برقم القضية أو العنوان...">
                        </div>
                        <div class="col-md-3">
                            <select id="statusFilter" class="form-select">
                                <option value="">كل الحالات</option>
                                <option value="active">نشطة</option>
                                <option value="pending">معلقة</option>
                                <option value="closed">مغلقة</option>
                            </select>
                        </div>
                    </div>

                    <div class="table-responsive">
                        <table class="table table-hover align-middle">
                            <thead class="table-light">
                                <tr>
                                    <th>رقم القضية</th>
                                    <th>العنوان</th>
                                    <th>العميل</th>
                                    <th>المحكمة</th>
                                    <th>الحالة</th>
                                    <th class="text-center">إجراءات</th>
                                </tr>
                            </thead>
                            <tbody id="casesTableBody">
                                <tr><td colspan="6" class="text-center text-muted py-4">جاري التحميل...</td></tr>
                            </tbody>
                        </table>
                    </div>

                </div>
            </div>

        </div>
    </div>
</div>

<!-- Modal: إضافة / تعديل قضية -->
<div class="modal fade" id="caseModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="caseModalTitle">إضافة قضية جديدة</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="caseId">

                <div class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label">رقم القضية *</label>
                        <input type="text" id="caseNumber" class="form-control" placeholder="مثال: 123">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">العنوان *</label>
                        <input type="text" id="caseTitle" class="form-control" placeholder="مثال: نزاع تجاري">
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">العميل *</label>
                        <select id="caseClient" class="form-select">
                            <option value="">-- اختر العميل --</option>
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">المحكمة</label>
                        <input type="text" id="caseCourt" class="form-control" placeholder="مثال: محكمة القاهرة الاقتصادية">
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">الحالة</label>
                        <select id="caseStatus" class="form-select">
                            <option value="active">نشطة</option>
                            <option value="pending">معلقة</option>
                            <option value="closed">مغلقة</option>
                        </select>
                    </div>

                    <div class="col-12">
                        <label class="form-label">الوصف</label>
                        <textarea id="caseDescription" class="form-control" rows="3" placeholder="تفاصيل إضافية عن القضية..."></textarea>
                    </div>
                </div>

                <div id="caseFormError" class="alert alert-danger mt-3 d-none"></div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">إلغاء</button>
                <button type="button" class="btn btn-primary" id="saveCaseBtn">حفظ</button>
            </div>
        </div>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script src="../../shared/js/config.js"></script>
<script src="../../shared/js/auth.js"></script>
<script src="../../shared/js/permissions.js"></script>
<script src="../../shared/js/mock-data.js"></script>
<script src="../../shared/js/api.js"></script>

<script src="../../shared/js/sidebar.js"></script>
<script src="./cases.js"></script>

</body>
</html>
