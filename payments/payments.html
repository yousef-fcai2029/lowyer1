<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الأتعاب والمدفوعات | نظام إدارة المحاماة</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="../../shared/css/style.css">
</head>
<body>

<div class="d-flex">

    <!-- Sidebar -->
    <nav class="sidebar p-2" style="width: 250px; position: sticky; top: 0;">
        <div class="sidebar-brand">⚖️ نظام المحاماة</div>
        <ul class="nav flex-column" id="sidebarNav"></ul>
    </nav>

    <!-- Main content -->
    <div class="flex-grow-1">

        <!-- Topbar -->
        <div class="topbar d-flex justify-content-between align-items-center px-4 py-3">
            <div>
                <span class="text-muted">مرحباً، </span>
                <strong id="welcomeUserName">--</strong>
                <span class="badge bg-secondary ms-2" id="welcomeUserRole">--</span>
            </div>
            <button class="btn btn-outline-danger btn-sm" id="logoutBtn">
                <i class="bi bi-box-arrow-left"></i> تسجيل الخروج
            </button>
        </div>

        <!-- Page content -->
        <div class="container-fluid p-4">

            <div class="d-flex justify-content-between align-items-center mb-4">
                <h5 class="mb-0"><i class="bi bi-cash-coin"></i> الأتعاب والمدفوعات</h5>
                <button class="btn btn-primary" id="addPaymentBtn">
                    <i class="bi bi-plus-lg"></i> تسجيل دفعة جديدة
                </button>
            </div>

            <!-- تنبيه وضع العرض فقط (يظهر فقط للسكرتيرة) -->
            <div class="alert alert-info d-none" id="readOnlyNotice">
                <i class="bi bi-info-circle"></i> لديك صلاحية عرض المدفوعات فقط. لتسجيل دفعة جديدة، يرجى التواصل مع المحامي المسؤول.
            </div>

            <div class="row g-3 mb-4" id="paymentsSummaryRow">
                <!-- كروت ملخص تتبنى ديناميكياً -->
            </div>

            <div class="card shadow-sm">
                <div class="card-body">

                    <div class="table-responsive">
                        <table class="table table-hover align-middle">
                            <thead class="table-light">
                                <tr>
                                    <th>رقم القضية</th>
                                    <th>عنوان القضية</th>
                                    <th>المبلغ</th>
                                    <th>التاريخ</th>
                                    <th>طريقة الدفع</th>
                                    <th>ملاحظات</th>
                                    <th class="text-center" id="actionsHeader">إجراءات</th>
                                </tr>
                            </thead>
                            <tbody id="paymentsTableBody">
                                <tr><td colspan="7" class="text-center text-muted py-4">جاري التحميل...</td></tr>
                            </tbody>
                        </table>
                    </div>

                </div>
            </div>

        </div>
    </div>
</div>

<!-- Modal: إضافة / تعديل دفعة -->
<div class="modal fade" id="paymentModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="paymentModalTitle">تسجيل دفعة جديدة</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="paymentId">

                <div class="mb-3">
                    <label class="form-label">القضية *</label>
                    <select id="paymentCase" class="form-select">
                        <option value="">-- اختر القضية --</option>
                    </select>
                </div>

                <div class="mb-3">
                    <label class="form-label">المبلغ (ج.م) *</label>
                    <input type="number" id="paymentAmount" class="form-control" placeholder="مثال: 5000">
                </div>

                <div class="mb-3">
                    <label class="form-label">التاريخ *</label>
                    <input type="date" id="paymentDate" class="form-control">
                </div>

                <div class="mb-3">
                    <label class="form-label">طريقة الدفع</label>
                    <select id="paymentMethod" class="form-select">
                        <option value="نقدي">نقدي</option>
                        <option value="تحويل بنكي">تحويل بنكي</option>
                        <option value="شيك">شيك</option>
                        <option value="فيزا/بطاقة">فيزا/بطاقة</option>
                    </select>
                </div>

                <div class="mb-3">
                    <label class="form-label">ملاحظات</label>
                    <input type="text" id="paymentNotes" class="form-control" placeholder="اختياري">
                </div>

                <div id="paymentFormError" class="alert alert-danger d-none"></div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">إلغاء</button>
                <button type="button" class="btn btn-primary" id="savePaymentBtn">حفظ</button>
            </div>
        </div>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script src="../../shared/js/config.js"></script>
<script src="../../shared/js/auth.js"></script>
<script src="../../shared/js/permissions.js"></script>
<script src="../../shared/js/mock-data.js"></script>
<script src="../../shared/js/api.js"></script>

<script src="../../shared/js/sidebar.js"></script>
<script src="./payments.js"></script>

</body>
</html>
