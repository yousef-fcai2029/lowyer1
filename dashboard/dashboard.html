<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الرئيسية | نظام إدارة المحاماة</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="../../shared/css/style.css">
</head>
<body>

<div class="d-flex">

    <!-- Sidebar -->
    <nav class="sidebar p-2" style="width: 250px; position: sticky; top: 0;">
        <div class="sidebar-brand">⚖️ نظام المحاماة</div>
        <ul class="nav flex-column" id="sidebarNav">
            <!-- يتم بناؤها ديناميكياً حسب دور المستخدم في dashboard.js -->
        </ul>
    </nav>

    <!-- Main content -->
    <div class="flex-grow-1">

        <!-- Topbar -->
        <div class="topbar d-flex justify-content-between align-items-center px-4 py-3">
            <div>
                <span class="text-muted">مرحباً، </span>
                <strong id="welcomeUserName">--</strong>
                <span class="badge bg-secondary ms-2" id="welcomeUserRole">--</span>
            </div>
            <button class="btn btn-outline-danger btn-sm" id="logoutBtn">
                <i class="bi bi-box-arrow-left"></i> تسجيل الخروج
            </button>
        </div>

        <!-- Page content -->
        <div class="container-fluid p-4">

            <h5 class="mb-4">نظرة عامة</h5>

            <div class="row g-3" id="statsRow">
                <!-- كروت الإحصائيات تتبنى ديناميكياً -->
                <div class="col-12 text-center text-muted py-5" id="statsLoading">
                    <div class="spinner-border text-primary" role="status"></div>
                    <p class="mt-2">جاري تحميل البيانات...</p>
                </div>
            </div>

            <div class="row mt-4 g-3">
                <div class="col-md-6">
                    <div class="card shadow-sm">
                        <div class="card-header bg-white">
                            <strong>أحدث القضايا</strong>
                        </div>
                        <ul class="list-group list-group-flush" id="recentCasesList">
                            <li class="list-group-item text-muted">جاري التحميل...</li>
                        </ul>
                    </div>
                </div>

                <div class="col-md-6">
                    <div class="card shadow-sm">
                        <div class="card-header bg-white">
                            <strong>الإشعارات</strong>
                        </div>
                        <ul class="list-group list-group-flush" id="notificationsList">
                            <li class="list-group-item text-muted">جاري التحميل...</li>
                        </ul>
                    </div>
                </div>
            </div>

        </div>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script src="../../shared/js/config.js"></script>
<script src="../../shared/js/auth.js"></script>
<script src="../../shared/js/permissions.js"></script>
<script src="../../shared/js/mock-data.js"></script>
<script src="../../shared/js/api.js"></script>

<script src="../../shared/js/sidebar.js"></script>
<script src="./dashboard.js"></script>

</body>
</html>
