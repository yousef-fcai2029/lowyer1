<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول | نظام إدارة المحاماة</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css">
    <link rel="stylesheet" href="../../shared/css/style.css">
</head>
<body>

<div class="container vh-100 d-flex align-items-center justify-content-center">
    <div class="card shadow p-4" style="width: 100%; max-width: 400px;">

        <h4 class="text-center mb-4">⚖️ نظام إدارة المحاماة</h4>

        <div class="mb-3">
            <label class="form-label">البريد الإلكتروني</label>
            <input type="email" id="email" class="form-control" placeholder="example@email.com">
        </div>

        <div class="mb-3">
            <label class="form-label">كلمة المرور</label>
            <input type="password" id="password" class="form-control" placeholder="••••••••">
        </div>

        <div id="error-msg" class="alert alert-danger d-none"></div>

        <button id="loginBtn" class="btn btn-primary w-100 mb-3">
            <span id="loginBtnText">دخول</span>
            <span id="loginSpinner" class="spinner-border spinner-border-sm d-none" role="status"></span>
        </button>

        <hr>

        <p class="text-muted small text-center mb-2">حسابات تجريبية (Mock Data)</p>
        <div class="d-flex gap-2 flex-wrap justify-content-center">
            <button type="button" class="btn btn-outline-secondary btn-sm demo-account" data-email="admin@test.com" data-password="123456">
                Admin
            </button>
            <button type="button" class="btn btn-outline-secondary btn-sm demo-account" data-email="lawyer@test.com" data-password="123456">
                Lawyer
            </button>
            <button type="button" class="btn btn-outline-secondary btn-sm demo-account" data-email="secretary@test.com" data-password="123456">
                Secretary
            </button>
        </div>

    </div>
</div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script src="../../shared/js/config.js"></script>
<script src="../../shared/js/auth.js"></script>
<script src="../../shared/js/mock-data.js"></script>
<script src="../../shared/js/api.js"></script>

<script src="./login.js"></script>

</body>
</html>
